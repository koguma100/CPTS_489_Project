<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Project</title>
    
    <!-- Link to the Tailwind CSS output file -->
    <link href="../public/output.css" rel="stylesheet">
    
</head>



<body class="bg-gray-100 min-h-screen" data-page="join">
    <!-- This is a component for the navbar-->
    <Navbar-component></Navbar-component>
    <script type="module" src="./components/navbar.js"></script>
    
<main class="flex items-center justify-center px-6 py-16">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-gray-800">Join a Game</h1>
            <p class="text-gray-500 mt-2">Enter the lobby code to start playing</p>
        </div>

        <form id="joinGameForm" class="space-y-5">

            <!-- Lobby Code -->
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">
                    Lobby Code
                </label>

                <input
                    id="lobbyCode"
                    type="text"
                    placeholder="Enter lobby code"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:outline-none"
                    required
                >
            </div>

            <!-- Player Name -->
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">
                    Your Name
                </label>

                <input
                    id="playerName"
                    type="text"
                    placeholder="Enter your name"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:outline-none"
                >
            </div>

            <!-- Join Button -->
            <button
                type="submit"
                class="w-full bg-royal-plum hover:bg-royal-plum-dim text-white font-extrabold py-3 rounded-xl shadow-md transition"
            >
                Join Game
            </button>

        </form>

    </div>

</main>
<script type="module">
  import { GameController } from '../js/controllers/GameController.js'
  import { GameView } from '../js/views/GameView.js'

  const controller = new GameController(new GameView())

  document.getElementById('joinGameForm').addEventListener('submit', async function(e) {
    e.preventDefault()

    const pin = document.getElementById('lobbyCode').value.trim()
    const playerName = document.getElementById('playerName').value.trim()

    if (!pin || !playerName) {
      showError('Please enter both a lobby code and your name.')
      return
    }

    setLoading(true)

    try {
      await controller.joinGame(pin, playerName)

      // Store name so the lobby page knows who we are
      sessionStorage.setItem('playerName', playerName)
      sessionStorage.setItem('gamePin', pin)

      // Redirect to lobby
      window.location.href = '/pages/game/playerLobby.html'

    } catch (err) {
      showError(err.message.includes('No rows')
        ? 'Game not found. Check the code and try again.'
        : 'Something went wrong. Please try again.'
      )
    } finally {
      setLoading(false)
    }
  })

  function setLoading(on) {
    const btn = document.querySelector('[type="submit"]')
    btn.disabled = on
    btn.textContent = on ? 'Joining…' : 'Join Game'
  }

  function showError(message) {
    let el = document.getElementById('error-msg')
    if (!el) {
      el = document.createElement('p')
      el.id = 'error-msg'
      el.className = 'text-red-500 text-sm text-center mt-2'
      document.getElementById('joinGameForm').appendChild(el)
    }
    el.textContent = message
  }
</script>

</body>
</html>
