<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../public/output.css" rel="stylesheet">
</head>
<body>
    <Navbar-component></Navbar-component>
    <script type="module" src="./components/navbar.js"></script>

    <main class="min-h-screen bg-gray-100 flex items-center justify-center">

        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

            <!-- Title -->
            <div class="text-center mb-6">
                <h2 class="text-3xl font-extrabold text-gray-800">Welcome to Let It Ride</h2>
                <p class="text-gray-500 mt-2">Login to continue</p>
            </div>

            <!-- Error message -->
            <p id="login-error" class="hidden mb-4 text-sm text-berry-lipstick font-semibold text-center bg-berry-lipstick/10 rounded-xl px-4 py-2"></p>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">

                <!-- Email or Username -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Email or Username</label>
                    <input
                        id="login-email"
                        type="text"
                        placeholder="Enter your email or username"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Password</label>
                    <input
                        id="login-password"
                        type="password"
                        placeholder="Enter your password"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-600">
                        <input type="checkbox" class="accent-green-600">
                        Remember me
                    </label>
                    <a href="resetPassword.html" class="text-green-600 hover:underline">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button
                    id="login-btn"
                    type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition">
                    Log In
                </button>

            </form>

            <!-- Divider -->
            <div class="my-6 flex items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="mx-4 text-gray-400 text-sm">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <!-- Register link -->
            <p class="text-center text-sm text-gray-600">
                Don't have an account?
                <a href="register.html" class="text-green-600 font-semibold hover:underline">Sign up</a>
            </p>

        </div>

    </main>

    <script type="module">
        import { init } from '../js/views/auth/loginView.js';
        init();
    </script>
</body>
</html>
