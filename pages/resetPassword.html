<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Let It Ride</title>
  <link href="../public/output.css" rel="stylesheet">
</head>
<body>
  <Navbar-component></Navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="min-h-screen bg-gray-100 flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

      <!-- Title -->
      <div class="text-center mb-6">
        <h2 class="text-3xl font-extrabold text-gray-800">Reset Your Password</h2>
        <p class="text-gray-500 mt-2">Enter a new password for your account</p>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-3"></div>

      <!-- Form -->
      <form id="resetForm" class="space-y-5">

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-2">New Password</label>
          <input id="password" type="password" placeholder="Min. 6 characters"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-2">Confirm Password</label>
          <input id="confirm-password" type="password" placeholder="Repeat your new password"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition" />
        </div>

        <button type="submit" id="submit-btn"
          class="w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition">
          Update Password
        </button>

      </form>

      <!-- divider -->
      <div class="my-6 flex items-center">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="mx-4 text-gray-400 text-sm">OR</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <p class="text-center text-sm text-gray-600">
        Remember your password?
        <a href="login.html" class="text-green-600 font-semibold hover:underline">Log in</a>
      </p>

    </div>
  </main>

  <script type="module">
    import { init } from '../js/views/auth/resetPasswordView.js';
    init();
  </script>

</body>
</html>
