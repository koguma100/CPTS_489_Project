<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="../public/output.css" rel="stylesheet" />
  <title>Quiz Dashboard</title>
<script src="/public/js/config.js"></script>
</head>

<body data-page="dashboard" class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <navbar-component></navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="py-8 space-y-8">

    <!-- Greeting -->
    <section class="max-w-5xl mx-auto px-2">
      <h1 id="dashboard-greeting" class="text-3xl font-extrabold text-gray-800">
        Welcome back!
      </h1>
      <p class="text-gray-500 mt-1">Here's what's waiting for you today.</p>
    </section>

    <!-- Search + Category Filter -->
    <section class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-6">
      <div class="flex flex-col md:flex-row md:flex-wrap gap-4 md:items-end">
        <div class="flex-1 min-w-[260px]">
          <label for="quizSearch" class="block text-sm font-medium text-gray-700 mb-1">
            Search quizzes
          </label>
          <input
            id="quizSearch"
            type="text"
            placeholder="Search by title or description..."
            class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="w-full md:w-[220px]">
          <label for="categoryFilter" class="block text-sm font-medium text-gray-700 mb-1">
            Category
          </label>
          <select
            id="categoryFilter"
            class="w-full rounded-lg border border-gray-300 px-4 pr-10 py-2"
          >
            <option value="">All Categories</option>
            <option value="Math">Math</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
            <option value="Coding">Coding</option>
          </select>
        </div>
      </div>

      <div class="mt-4 flex justify-end">
        <button
          id="clearFiltersBtn"
          class="px-4 py-2 rounded-lg bg-gray-800 text-white hover:opacity-90"
        >
          Clear Filters
        </button>
      </div>
    </section>

    <!-- Your Quizzes -->
    <section class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Your Quizzes</h2>
        <div class="flex gap-3">
          <button
            id="prevBtn1"
            type="button"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white font-bold text-xl border border-gray-800 hover:opacity-90"
            aria-label="Previous quizzes"
          >
            &lt;
          </button>
          <button
            id="nextBtn1"
            type="button"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white font-bold text-xl border border-gray-800 hover:opacity-90"
            aria-label="Next quizzes"
          >
            &gt;
          </button>
        </div>
      </div>

      <div class="overflow-hidden">
        <div id="quizTrack1" class="flex gap-4 transition-transform duration-300 ease-in-out"></div>
      </div>
    </section>

    <!-- Past Quizzes -->
    <section class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Past Quizzes</h2>
        <div class="flex gap-3">
          <button
            id="prevBtn2"
            type="button"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white font-bold text-xl border border-gray-800 hover:opacity-90"
            aria-label="Previous quizzes"
          >
            &lt;
          </button>
          <button
            id="nextBtn2"
            type="button"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white font-bold text-xl border border-gray-800 hover:opacity-90"
            aria-label="Next quizzes"
          >
            &gt;
          </button>
        </div>
      </div>

      <div class="overflow-hidden">
        <div id="quizTrack2" class="flex gap-4 transition-transform duration-300 ease-in-out"></div>
      </div>
    </section>

    <!-- Recommended Quizzes -->
    <section class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Recommended Quizzes</h2>
        <div class="flex gap-3">
          <button
            id="prevBtn3"
            type="button"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white font-bold text-xl border border-gray-800 hover:opacity-90"
            aria-label="Previous quizzes"
          >
            &lt;
          </button>
          <button
            id="nextBtn3"
            type="button"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white font-bold text-xl border border-gray-800 hover:opacity-90"
            aria-label="Next quizzes"
          >
            &gt;
          </button>
        </div>
      </div>

      <div class="overflow-hidden">
        <div id="quizTrack3" class="flex gap-4 transition-transform duration-300 ease-in-out"></div>
      </div>
    </section>

  </main>

<script type="module">
  import { init } from '../js/views/user/userDashboardView.js';

  try {
    await init();
  } catch (err) {
    console.error('Dashboard init failed:', err);
  }
</script>

</body>
</html>
