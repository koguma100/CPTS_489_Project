<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a Game</title>
  <link href="../public/output.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 min-h-screen">
  <navbar-component></navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="px-6 py-10">
    <section class="max-w-3xl mx-auto">
      <div class="bg-white rounded-3xl shadow-2xl p-8">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-extrabold text-gray-800">Create a Game</h1>
          <p class="text-gray-500 mt-2">Set up your quiz lobby and question counts</p>
        </div>

        <form id="createQuizForm" class="space-y-6" enctype="multipart/form-data">
          <div>
            <label for="title" class="block text-sm font-bold text-gray-700 mb-2">
              Game Title
            </label>
            <input
              id="title"
              name="title"
              type="text"
              placeholder="Enter quiz title"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
              required
            />
          </div>

          <div>
            <label for="description" class="block text-sm font-bold text-gray-700 mb-2">
              Description
            </label>
            <textarea
              id="description"
              name="description"
              rows="4"
              placeholder="Enter a short description of your quiz"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"
              required
            ></textarea>
          </div>

          <div>
            <label for="category" class="block text-sm font-bold text-gray-700 mb-2">
              Category
            </label>
            <select
              id="category"
              name="category"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
              required
            >
              <option value="">Select a category</option>
              <option value="Math">Math</option>
              <option value="Science">Science</option>
              <option value="History">History</option>
              <option value="Coding">Coding</option>
            </select>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label for="tfQuestions" class="block text-sm font-bold text-gray-700 mb-2">
                Number of True / False Questions
              </label>
              <input
                id="tfQuestions"
                name="tfQuestions"
                type="number"
                min="0"
                placeholder="0"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
                required
              />
            </div>

            <div>
              <label for="mcQuestions" class="block text-sm font-bold text-gray-700 mb-2">
                Number of Multiple Choice Questions
              </label>
              <input
                id="mcQuestions"
                name="mcQuestions"
                type="number"
                min="0"
                placeholder="0"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
                required
              />
            </div>
          </div>

          <div>
            <label for="thumbnail" class="block text-sm font-bold text-gray-700 mb-2">
              Thumbnail Image
            </label>
            <input
              id="thumbnail"
              name="thumbnail"
              type="file"
              accept="image/*"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <div id="formMessage" class="hidden text-sm rounded-lg px-4 py-3"></div>

          <div class="pt-4">
            <button
              id="submitBtn"
              type="submit"
              class="w-full bg-berry-lipstick hover:bg-berry-lipstick-dim text-white font-extrabold py-3 rounded-xl shadow-md transition disabled:opacity-60"
            >
              Continue
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from '../js/supabase/supabase.js';

    const form = document.getElementById('createQuizForm');
    const submitBtn = document.getElementById('submitBtn');
    const formMessage = document.getElementById('formMessage');

    function showMessage(message, type = 'error') {
      formMessage.classList.remove(
        'hidden',
        'bg-red-100',
        'text-red-700',
        'bg-green-100',
        'text-green-700'
      );

      if (type === 'success') {
        formMessage.classList.add('bg-green-100', 'text-green-700');
      } else {
        formMessage.classList.add('bg-red-100', 'text-red-700');
      }

      formMessage.textContent = message;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';
      formMessage.classList.add('hidden');

      try {
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        const category = document.getElementById('category').value;
        const tfQuestions = Number(document.getElementById('tfQuestions').value);
        const mcQuestions = Number(document.getElementById('mcQuestions').value);
        const thumbnailFile = document.getElementById('thumbnail').files[0] || null;

        const { data: { user }, error: userError } = await supabase.auth.getUser();
        if (userError) throw new Error(userError.message);
        if (!user) throw new Error('You must be logged in to create a quiz.');

        let thumbnailUrl = null;

        if (thumbnailFile) {
          const fileExt = thumbnailFile.name.split('.').pop();
          const filePath = `quiz-thumbnails/${user.id}-${Date.now()}.${fileExt}`;

          const { error: uploadError } = await supabase.storage
            .from('quiz_thumbnails')
            .upload(filePath, thumbnailFile);

          if (uploadError) {
            throw new Error(`Thumbnail upload failed: ${uploadError.message}`);
          }

          const { data: publicUrlData } = supabase.storage
            .from('quiz_thumbnails')
            .getPublicUrl(filePath);

          thumbnailUrl = publicUrlData.publicUrl;
        }

        const quizPayload = {
          title,
          description,
          author: user.id,
          thumbnail: thumbnailUrl,
          category
        };

        const { data, error } = await supabase
          .from('quizzes')
          .insert([quizPayload])
          .select()
          .single();

        if (error) throw new Error(error.message);

        sessionStorage.setItem(
          'quizSetup',
          JSON.stringify({
            quizId: data.id,
            title: data.title,
            description: data.description,
            category: data.category,
            thumbnail: data.thumbnail,
            tfQuestions,
            mcQuestions
          })
        );

        showMessage('Quiz created successfully.', 'success');
        window.location.href = 'buildQuestions.html';
      } catch (err) {
        console.error(err);
        showMessage(err.message || 'Something went wrong while creating the quiz.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
