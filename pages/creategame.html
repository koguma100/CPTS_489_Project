<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Project</title>
    
    <!-- Link to the Tailwind CSS output file -->
    <link href="./../public/output.css" rel="stylesheet">
    
</head>



<body>
    <!-- This is a component for the navbar-->
    <Navbar-component></Navbar-component>
    <script src="../js/components/navbar.js"></script>

    <main class="px-6 py-10">
        <section class="max-w-3xl mx-auto">
            <div class="bg-white rounded-3xl shadow-2xl p-8">
                
                <!-- Heading -->
                <div class="mb-8 text-center">
                    <h1 class="text-3xl font-extrabold text-gray-800">Create a Game</h1>
                    <p class="text-gray-500 mt-2">Set up your quiz lobby and question counts</p>
                </div>

                <!-- Form -->
                <form class="space-y-6" action="#" method="POST" enctype="multipart/form-data">

                    <!-- Title -->
                    <div>
                        <label for="title" class="block text-sm font-bold text-gray-700 mb-2">
                            Game Title
                        </label>
                        <input
                            id="title"
                            name="title"
                            type="text"
                            placeholder="Enter quiz title"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
                            required
                        />
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="description" class="block text-sm font-bold text-gray-700 mb-2">
                            Description
                        </label>
                        <textarea
                            id="description"
                            name="description"
                            rows="4"
                            placeholder="Enter a short description of your quiz"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"
                            required
                        ></textarea>
                    </div>

                    <!-- Question Counts -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="tfQuestions" class="block text-sm font-bold text-gray-700 mb-2">
                                Number of True / False Questions
                            </label>
                            <input
                                id="tfQuestions"
                                name="tfQuestions"
                                type="number"
                                min="0"
                                placeholder="0"
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
                                required
                            />
                        </div>

                        <div>
                            <label for="mcQuestions" class="block text-sm font-bold text-gray-700 mb-2">
                                Number of Multiple Choice Questions
                            </label>
                            <input
                                id="mcQuestions"
                                name="mcQuestions"
                                type="number"
                                min="0"
                                placeholder="0"
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
                                required
                            />
                        </div>
                    </div>

                    <!-- Lobby Size -->
                    <div>
                        <label for="lobbySize" class="block text-sm font-bold text-gray-700 mb-2">
                            Max Players Allowed in Lobby
                        </label>
                        <input
                            id="lobbySize"
                            name="lobbySize"
                            type="number"
                            min="1"
                            placeholder="Enter max number of players"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
                            required
                        />
                    </div>

                    <!-- Thumbnail -->
                    <div>
                        <label for="thumbnail" class="block text-sm font-bold text-gray-700 mb-2">
                            Thumbnail Image
                        </label>
                        <input
                            id="thumbnail"
                            name="thumbnail"
                            type="file"
                            accept="image/*"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white focus:outline-none focus:ring-2 focus:ring-green-500"
                        />
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button
                            type="submit"
                            class="w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition"
                        >
                            Continue
                        </button>
                    </div>

                </form>
            </div>
        </section>
    </main>

</body>
</html>
