<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discover Quizzes</title>
  <link href="../public/output.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 min-h-screen">
  <navbar-component></navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="px-6 py-8">
    <section class="max-w-7xl mx-auto">
      <div class="mb-8">
        <h1 class="text-4xl font-extrabold text-gray-800">Discover Quizzes</h1>
        <p class="text-gray-500 mt-2">Play quizzes made by the community</p>
      </div>

      <!-- Search + Category Filter -->
      <section class="bg-white rounded-2xl shadow-lg p-6 mb-8">
        <div class="flex flex-col md:flex-row md:flex-wrap gap-4 md:items-end">
          <div class="flex-1 min-w-[260px]">
            <label for="quizSearch" class="block text-sm font-medium text-gray-700 mb-1">
              Search quizzes
            </label>
            <input
              id="quizSearch"
              type="text"
              placeholder="Search by title or description..."
              class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-berry-lipstick"
            />
          </div>

          <div class="w-full md:w-[220px]">
            <label for="categoryFilter" class="block text-sm font-medium text-gray-700 mb-1">
              Category
            </label>
            <select
              id="categoryFilter"
              class="w-full rounded-lg border border-gray-300 px-4 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-berry-lipstick"
            >
              <option value="">All Categories</option>
              <option value="History">History</option>
              <option value="Science">Science</option>
              <option value="Cybersecurity">Cybersecurity</option>
              <option value="Gaming">Gaming</option>
              <option value="General Knowledge">General Knowledge</option>
            </select>
          </div>
        </div>

        <div class="mt-4 flex justify-end">
          <button
            id="clearFiltersBtn"
            class="px-4 py-2 rounded-lg bg-gray-800 text-white hover:opacity-90"
          >
            Clear Filters
          </button>
        </div>
      </section>

      <!-- Quiz cards -->
      <div id="quiz-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </section>
  </main>

  <script type="module" src="../js/controllers/guest/guestDashboardController.js"></script>
</body>
</html>
