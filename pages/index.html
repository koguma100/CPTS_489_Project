<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Project</title>
    
    <!-- Link to the Tailwind CSS output file -->
    <link href="./../public/output.css" rel="stylesheet">
    
</head>



<body>
    <!-- This is a component for the navbar-->
    <Navbar-component></Navbar-component>
    <script src="../js/components/navbar.js"></script>
    
    <main class="px-6 py-8">
        <section class="max-w-7xl mx-auto">
            <div class="mb-8">
                <h1 class="text-4xl font-extrabold text-gray-800">Discover Quizzes</h1>
                <p class="text-gray-500 mt-2">Play quizzes made by the community</p>
            </div>
            <!-- Search and Filter -->
            <div class="mb-8 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
                <div class="w-full md:w-2/3">
                    <input
                        type="text"
                        placeholder="Search quizzes..."
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-berry-lipstick"
                    />
                </div>

                <div class="w-full md:w-1/3">
                    <select
                        class="w-1/2 px-4 py-3 rounded-xl border border-gray-300 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-berry-lipstick"
                    >
                        <option value="">Filter by category</option>
                        <option value="history">History</option>
                        <option value="science">Science</option>
                        <option value="cybersecurity">Cybersecurity</option>
                        <option value="gaming">Gaming</option>
                        <option value="general">General Knowledge</option>
                    </select>
                </div>
            </div>
            <!-- Quiz list -->
            <div id="quiz-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Cards will be inserted here -->
            </div>
        </section>

    </main>

    <script src="../js/components/postings.js"></script>

</body>
</html>
