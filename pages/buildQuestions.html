<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Questions</title>
  <link href="../public/output.css" rel="stylesheet" />
<script src="/public/js/config.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <navbar-component></navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="px-6 py-10">
    <section class="max-w-4xl mx-auto">
      <div class="bg-white rounded-3xl shadow-2xl p-8">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-extrabold text-gray-800">Build Your Questions</h1>
          <p class="text-gray-500 mt-2">Fill in the questions for your quiz</p>
        </div>

        <form id="questionsForm" class="space-y-8" enctype="multipart/form-data">
          <div id="questionsContainer" class="space-y-8"></div>
          <div id="formMessage" class="hidden text-sm rounded-lg px-4 py-3"></div>

          <button
            id="saveQuestionsBtn"
            type="submit"
            class="w-full bg-berry-lipstick hover:bg-berry-lipstick-dim text-white font-extrabold py-3 rounded-xl shadow-md transition disabled:opacity-60"
          >
            Save Quiz
          </button>
        </form>
      </div>
    </section>
  </main>

<script type="module" src="../js/controllers/createGameController.js"></script>
</body>
</html>
