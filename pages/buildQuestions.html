<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Questions</title>
  <link href="../public/output.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 min-h-screen">

  <navbar-component></navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="px-6 py-10">
    <section class="max-w-4xl mx-auto">
      <div class="bg-white rounded-3xl shadow-2xl p-8">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-extrabold text-gray-800">Build Your Questions</h1>
          <p class="text-gray-500 mt-2">Fill in the questions for your quiz</p>
        </div>

        <form id="questionsForm" class="space-y-8" enctype="multipart/form-data">
          <div id="questionsContainer" class="space-y-8"></div>
          <div id="formMessage" class="hidden text-sm rounded-lg px-4 py-3"></div>

          <button
            id="saveQuestionsBtn"
            type="submit"
            class="w-full bg-berry-lipstick hover:bg-berry-lipstick-dim text-white font-extrabold py-3 rounded-xl shadow-md transition disabled:opacity-60"
          >
            Save Quiz
          </button>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from '../js/supabase/supabase.js';

    const quizSetup = JSON.parse(sessionStorage.getItem('quizSetup'));
    const container = document.getElementById('questionsContainer');
    const questionsForm = document.getElementById('questionsForm');
    const saveQuestionsBtn = document.getElementById('saveQuestionsBtn');
    const formMessage = document.getElementById('formMessage');

    function showMessage(message, type = 'error') {
      formMessage.classList.remove(
        'hidden',
        'bg-red-100',
        'text-red-700',
        'bg-green-100',
        'text-green-700'
      );

      if (type === 'success') {
        formMessage.classList.add('bg-green-100', 'text-green-700');
      } else {
        formMessage.classList.add('bg-red-100', 'text-red-700');
      }

      formMessage.textContent = message;
    }

    function renderQuestionBuilders() {
      if (!quizSetup || !quizSetup.quizId) {
        container.innerHTML = `
          <p class="text-red-500 font-semibold">
            No quiz setup found. Please go back and create a game first.
          </p>
        `;
        saveQuestionsBtn.disabled = true;
        return;
      }

      let orderNumber = 1;

      for (let i = 1; i <= quizSetup.tfQuestions; i++, orderNumber++) {
        const block = document.createElement('div');
        block.className = 'border border-gray-200 rounded-2xl p-6 bg-gray-50';
        block.innerHTML = `
          <h2 class="text-xl font-bold text-gray-800 mb-4">True / False Question ${i}</h2>

          <input type="hidden" name="tf_order_${i}" value="${orderNumber}" />

          <label class="block text-sm font-bold text-gray-700 mb-2">Question</label>
          <input
            type="text"
            name="tf_question_${i}"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
            placeholder="Enter true/false question"
            required
          />

          <label class="block text-sm font-bold text-gray-700 mb-2">Correct Answer</label>
          <select
            name="tf_answer_${i}"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
            required
          >
            <option value="">Select answer</option>
            <option value="1">True</option>
            <option value="2">False</option>
          </select>

          <label class="block text-sm font-bold text-gray-700 mb-2">Question Thumbnail</label>
          <input
            type="file"
            name="tf_thumbnail_${i}"
            accept="image/*"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white"
          />
        `;
        container.appendChild(block);
      }

      for (let i = 1; i <= quizSetup.mcQuestions; i++, orderNumber++) {
        const block = document.createElement('div');
        block.className = 'border border-gray-200 rounded-2xl p-6 bg-gray-50';
        block.innerHTML = `
          <h2 class="text-xl font-bold text-gray-800 mb-4">Multiple Choice Question ${i}</h2>

          <input type="hidden" name="mc_order_${i}" value="${orderNumber}" />

          <label class="block text-sm font-bold text-gray-700 mb-2">Question</label>
          <input
            type="text"
            name="mc_question_${i}"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
            placeholder="Enter multiple choice question"
            required
          />

          <label class="block text-sm font-bold text-gray-700 mb-2">Option A</label>
          <input
            type="text"
            name="mc_${i}_a"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-3"
            required
          />

          <label class="block text-sm font-bold text-gray-700 mb-2">Option B</label>
          <input
            type="text"
            name="mc_${i}_b"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-3"
            required
          />

          <label class="block text-sm font-bold text-gray-700 mb-2">Option C</label>
          <input
            type="text"
            name="mc_${i}_c"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-3"
            required
          />

          <label class="block text-sm font-bold text-gray-700 mb-2">Option D</label>
          <input
            type="text"
            name="mc_${i}_d"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
            required
          />

          <label class="block text-sm font-bold text-gray-700 mb-2">Correct Answer</label>
          <select
            name="mc_answer_${i}"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
            required
          >
            <option value="">Select correct answer</option>
            <option value="1">Option A</option>
            <option value="2">Option B</option>
            <option value="3">Option C</option>
            <option value="4">Option D</option>
          </select>

          <label class="block text-sm font-bold text-gray-700 mb-2">Question Thumbnail</label>
          <input
            type="file"
            name="mc_thumbnail_${i}"
            accept="image/*"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white"
          />
        `;
        container.appendChild(block);
      }
    }

    async function uploadQuestionThumbnail(file, userId) {
      if (!file) return null;

      const fileExt = file.name.split('.').pop();
      const filePath = `question-thumbnails/${userId}-${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;

      const { error: uploadError } = await supabase.storage
        .from('question_thumbnails')
        .upload(filePath, file);

      if (uploadError) {
        throw new Error(`Question thumbnail upload failed: ${uploadError.message}`);
      }

      const { data: publicUrlData } = supabase.storage
        .from('question_thumbnails')
        .getPublicUrl(filePath);

      return publicUrlData.publicUrl;
    }

    renderQuestionBuilders();

    questionsForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!quizSetup || !quizSetup.quizId) {
        showMessage('No quiz setup found. Please go back and create a game first.');
        return;
      }

      saveQuestionsBtn.disabled = true;
      saveQuestionsBtn.textContent = 'Saving...';
      formMessage.classList.add('hidden');

      try {
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        if (userError) throw new Error(userError.message);
        if (!user) throw new Error('You must be logged in to save questions.');

        const questionRows = [];

        for (let i = 1; i <= quizSetup.tfQuestions; i++) {
          const thumbnailFile = questionsForm.elements[`tf_thumbnail_${i}`].files[0] || null;
          const thumbnailUrl = await uploadQuestionThumbnail(thumbnailFile, user.id);

          questionRows.push({
            order: Number(questionsForm.elements[`tf_order_${i}`].value),
            quiz: quizSetup.quizId,
            question: questionsForm.elements[`tf_question_${i}`].value.trim(),
            answer1: 'True',
            answer2: 'False',
            answer3: null,
            answer4: null,
            isMultiple: false,
            correctAnswer: Number(questionsForm.elements[`tf_answer_${i}`].value),
            thumbnail: thumbnailUrl
          });
        }

        for (let i = 1; i <= quizSetup.mcQuestions; i++) {
          const thumbnailFile = questionsForm.elements[`mc_thumbnail_${i}`].files[0] || null;
          const thumbnailUrl = await uploadQuestionThumbnail(thumbnailFile, user.id);

          questionRows.push({
            order: Number(questionsForm.elements[`mc_order_${i}`].value),
            quiz: quizSetup.quizId,
            question: questionsForm.elements[`mc_question_${i}`].value.trim(),
            answer1: questionsForm.elements[`mc_${i}_a`].value.trim(),
            answer2: questionsForm.elements[`mc_${i}_b`].value.trim(),
            answer3: questionsForm.elements[`mc_${i}_c`].value.trim(),
            answer4: questionsForm.elements[`mc_${i}_d`].value.trim(),
            isMultiple: true,
            correctAnswer: Number(questionsForm.elements[`mc_answer_${i}`].value),
            thumbnail: thumbnailUrl
          });
        }

        const { error } = await supabase
          .from('quiz_questions')
          .insert(questionRows);

        if (error) {
          throw new Error(error.message);
        }

        sessionStorage.removeItem('quizSetup');
        showMessage('Questions saved successfully.', 'success');
        window.location.href = 'index.html';
      } catch (err) {
        console.error(err);
        showMessage(err.message || 'Failed to save questions.');
      } finally {
        saveQuestionsBtn.disabled = false;
        saveQuestionsBtn.textContent = 'Save Quiz';
      }
    });
  </script>
</body>
</html>
