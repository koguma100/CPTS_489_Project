<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Lobby</title>
  <link rel="stylesheet" href="./../../public/output.css" />
</head>
<body class="bg-midnight-violet min-h-screen font-mono">

  <!-- Header -->
  <header class="bg-royal-plum border-b border-berry-lipstick px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-tight text-white">Game Lobby</h1>
    <div class="text-white text-3xl">Quiz Title</div>
    <span id="status-badge" class="text-xs bg-midnight-violet text-white border border-blaze-orange px-2 py-1 rounded">
      Waiting for players...
    </span>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-10 space-y-8">

    <!-- Game Code -->
    <section class="bg-royal-plum border border-berry-lipstick rounded p-6 text-center">
      <p class="text-sm text-white blaze-orange uppercase tracking-widest mb-2">Join Code</p>
      <p id="game-code" class="text-6xl font-bold tracking-widest text-white">847291</p>
      <p class="text-sm text-white/50 mt-3">
        Go to <span class="font-semibold text-jungle-green">game.example.com</span> and enter this code
      </p>
    </section>

    <!-- Player Count & Controls -->
    <section class="flex items-center justify-between">
      <div>
        <span class="text-sm text-white">Players joined:</span>
        <span id="player-count" class="ml-2 text-lg font-bold text-jungle-green">3</span>
      </div>
      <div class="flex gap-2">
        <button
          id="btn-kick"
          onclick="kickSelected()"
          class="text-sm border border-berry-lipstick text-white px-3 py-1.5 rounded hover:bg-berry-lipstick disabled:opacity-40 disabled:cursor-not-allowed"
          disabled
        >
          Kick
        </button>
        <button
          id="btn-start"
          onclick="startGame()"
          class="text-sm bg-blaze-orange text-white px-4 py-1.5 rounded hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Start Game
        </button>
      </div>
    </section>

    <!-- Player List -->
    <section>
      <ul id="player-list" class="space-y-2">
        <!-- Players rendered by JS -->
      </ul>
      <p id="empty-msg" class="text-sm text-white/50 text-center py-6 hidden">No players yet. Waiting...</p>
    </section>

  </main>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────

    let players = [
      { id: 1, name: "Alice" },
      { id: 2, name: "Bob" },
      { id: 3, name: "Charlie" },
    ];

    let selectedId = null;

    // ── Render ────────────────────────────────────────────────────────────────

    function render() {
      const list = document.getElementById("player-list");
      const emptyMsg = document.getElementById("empty-msg");
      const countEl = document.getElementById("player-count");
      const kickBtn = document.getElementById("btn-kick");

      countEl.textContent = players.length;
      list.innerHTML = "";

      if (players.length === 0) {
        emptyMsg.classList.remove("hidden");
      } else {
        emptyMsg.classList.add("hidden");
        players.forEach(player => {
          const li = document.createElement("li");
          const isSelected = player.id === selectedId;

          li.className = [
            "flex items-center justify-between px-4 py-3 border rounded cursor-pointer select-none text-white",
            isSelected
              ? "bg-berry-lipstick border-berry-lipstick"
              : "bg-royal-plum border-royal-plum hover:border-berry-lipstick"
          ].join(" ");

          li.innerHTML = `
            <span class="font-medium">${escapeHtml(player.name)}</span>
            <span class="text-xs ${isSelected ? "text-white/70" : "text-blaze-orange"}">ID ${player.id}</span>
          `;

          li.addEventListener("click", () => selectPlayer(player.id));
          list.appendChild(li);
        });
      }

      kickBtn.disabled = selectedId === null;
    }

    // ── Actions ───────────────────────────────────────────────────────────────

    function selectPlayer(id) {
      selectedId = selectedId === id ? null : id;
      render();
    }

    function kickSelected() {
      if (selectedId === null) return;
      players = players.filter(p => p.id !== selectedId);
      selectedId = null;
      render();
    }

    function startGame() {
      if (players.length === 0) {
        showToast("No players to start with!");
        return;
      }

     
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── Simulate a player joining (for demo) ──────────────────────────────────

    let nextId = 4;
    const names = ["Diana", "Evan", "Fiona", "George", "Hannah", "Ivan"];
    setInterval(() => {
      if (players.length < 8 && names.length > 0) {
        const name = names.shift();
        players.push({ id: nextId++, name });
        render();
      }
    }, 3000);

    // ── Init ──────────────────────────────────────────────────────────────────
    render();
  </script>

</body>
</html>
