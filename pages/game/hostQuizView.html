<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Question View</title>
  <link rel="stylesheet" href="../../public/output.css" />
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-midnight-violet shadow-lg border-b border-white/10">
    <div class="px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
      <h1 class="text-xl font-bold tracking-tight text-white">Host View</h1>

      <div class="text-3xl font-bold text-blaze-orange">Quiz Title</div>

      <div class="flex items-center gap-3 flex-wrap">
        <span class="text-xs text-white font-semibold bg-jungle-green shadow ring-1 ring-white/15 px-3 py-2 rounded-xl">
          Live Question Control
        </span>

        <button
          id="end-quiz-btn"
          class="text-sm rounded-xl text-white font-semibold bg-red-500 shadow ring-1 ring-white/15 hover:bg-red-600 transition px-4 py-2"
        >
          End Quiz
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10 flex flex-col gap-8">

    <!-- Active Question Panel -->
    <section class="bg-white border border-gray-200 rounded-2xl p-6 shadow-lg">
      <div class="flex items-center justify-between mb-6 gap-4 flex-wrap">
        <div>
          <p class="text-sm uppercase tracking-widest text-berry-lipstick">Current Question</p>
          <h2 id="question-number" class="text-2xl font-bold text-midnight-violet mt-1">
            Question 1 of 5
          </h2>
        </div>

        <div class="flex gap-2">
          <button
            id="prev-btn"
            class="text-sm rounded-xl text-white font-semibold bg-royal-plum shadow ring-1 ring-white/15 hover:brightness-110 transition px-4 py-2 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Previous
          </button>
          <button
            id="next-btn"
            class="text-sm rounded-xl text-white font-semibold bg-blaze-orange shadow ring-1 ring-white/15 hover:brightness-110 transition px-4 py-2 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Next
          </button>
        </div>
      </div>

      <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 shadow-sm">
        <p id="question-text" class="text-3xl text-midnight-violet font-bold leading-relaxed mb-8">
          What is the capital of France?
        </p>

        <div id="answer-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Answers rendered by JS -->
        </div>
      </div>
    </section>

    <!-- Question List -->
    <aside class="bg-white border border-gray-200 rounded-2xl p-6 shadow-md">
      <div class="mb-4">
        <p class="text-sm uppercase tracking-widest text-berry-lipstick">All Questions</p>
        <h2 class="text-xl font-bold text-midnight-violet mt-1">Question Queue</h2>
      </div>

      <ul id="question-list" class="space-y-3">
        <!-- Questions rendered by JS -->
      </ul>
    </aside>

  </main>

  <!-- Ignore JS this will pull from our backend once we set that up, for now this is a placeholder
   generated by AI to show what this should look like when fully implemented. -->
  <script>
    const questions = [
      {
        text: "What is the capital of France?",
        answers: ["Paris", "Berlin", "Madrid", "Rome"]
      },
      {
        text: "Which planet is known as the Red Planet?",
        answers: ["Venus", "Mars", "Jupiter", "Mercury"]
      },
      {
        text: "What does HTML stand for?",
        answers: [
          "HyperText Markup Language",
          "HighText Machine Language",
          "HyperTool Multi Language",
          "Home Tool Markup Language"
        ]
      },
      {
        text: "Which ocean is the largest?",
        answers: ["Atlantic", "Indian", "Pacific", "Arctic"]
      },
      {
        text: "What is 9 x 7?",
        answers: ["56", "63", "72", "49"]
      }
    ];

    let currentQuestionIndex = 0;

    function renderHostView() {
      const questionNumber = document.getElementById("question-number");
      const questionText = document.getElementById("question-text");
      const answerList = document.getElementById("answer-list");
      const questionList = document.getElementById("question-list");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");

      const current = questions[currentQuestionIndex];

      questionNumber.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
      questionText.textContent = current.text;

      answerList.innerHTML = "";

      current.answers.forEach((answer, index) => {
        const colorClasses = [
          "bg-jungle-green text-white",
          "bg-blaze-orange text-white",
          "bg-berry-lipstick text-white",
          "bg-royal-plum text-white"
        ];

        const answerCard = document.createElement("div");
        answerCard.className = `rounded-xl px-4 py-3 shadow ring-1 ring-white/15 transition hover:brightness-110 ${colorClasses[index % colorClasses.length]}`;

        answerCard.innerHTML = `
          <span class="font-bold mr-2">${String.fromCharCode(65 + index)}.</span>
          <span>${escapeHtml(answer)}</span>
        `;

        answerList.appendChild(answerCard);
      });

      questionList.innerHTML = "";

      questions.forEach((question, index) => {
        const li = document.createElement("li");
        const isActive = index === currentQuestionIndex;

        li.className = [
          "border rounded-xl px-4 py-3 cursor-pointer transition shadow-sm",
          isActive
            ? "bg-midnight-violet border-midnight-violet text-white"
            : "bg-white border-gray-200 text-midnight-violet hover:border-blaze-orange hover:bg-orange-50"
        ].join(" ");

        li.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-bold ${isActive ? "text-blaze-orange" : "text-berry-lipstick"}">
                Q${index + 1}
              </p>
              <p class="text-sm leading-snug mt-1">
                ${escapeHtml(question.text)}
              </p>
            </div>
          </div>
        `;

        li.addEventListener("click", () => {
          currentQuestionIndex = index;
          renderHostView();
        });

        questionList.appendChild(li);
      });

      prevBtn.disabled = currentQuestionIndex === 0;
      nextBtn.disabled = currentQuestionIndex === questions.length - 1;
    }

    document.getElementById("prev-btn").addEventListener("click", () => {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderHostView();
      }
    });

    document.getElementById("next-btn").addEventListener("click", () => {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderHostView();
      }
    });

    document.getElementById("end-quiz-btn").addEventListener("click", () => {
      const confirmEnd = confirm("Are you sure you want to end the quiz?");
      if (confirmEnd) {
        window.location.href = "/game/results";
      }
    });

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    renderHostView();
  </script>

</body>
</html>
