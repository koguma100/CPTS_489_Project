<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Details</title>
  <link rel="stylesheet" href="../../public/output.css" />
  <script src="/public/js/config.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-midnight-violet shadow-lg border-b border-white/10">
    <div class="px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
      <a
        href="/dashboard"
        class="text-white hover:text-blaze-orange transition text-sm font-semibold"
      >
        &larr; Back to Dashboard
      </a>

      <div id="quiz-title" class="text-2xl font-bold text-blaze-orange">Loading...</div>

      <button
        id="host-btn"
        class="text-sm rounded-xl text-white font-semibold bg-jungle-green shadow ring-1 ring-white/15 hover:brightness-110 transition px-4 py-2"
      >
        Host This Quiz
      </button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10 flex flex-col gap-8">

    <!-- Loading state -->
    <div id="loading-state" class="text-center py-16 text-gray-500 text-lg">
      Loading quiz...
    </div>

    <!-- Error state -->
    <div
      id="error-state"
      class="hidden bg-white border border-red-200 rounded-2xl p-8 text-center text-red-500 text-lg"
    ></div>

    <!-- Question Browser Panel -->
    <section id="question-panel" class="hidden bg-white border border-gray-200 rounded-2xl p-6 shadow-lg">
      <div class="flex items-center justify-between mb-6 gap-4 flex-wrap">
        <div>
          <p class="text-sm uppercase tracking-widest text-berry-lipstick">Questions Preview</p>
          <h2 id="question-number" class="text-2xl font-bold text-midnight-violet mt-1">
            Question 1 of 0
          </h2>
        </div>

        <div class="flex gap-2">
          <button
            id="prev-btn"
            class="text-sm rounded-xl text-white font-semibold bg-royal-plum shadow ring-1 ring-white/15 hover:brightness-110 transition px-4 py-2 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Previous
          </button>
          <button
            id="next-btn"
            class="text-sm rounded-xl text-white font-semibold bg-blaze-orange shadow ring-1 ring-white/15 hover:brightness-110 transition px-4 py-2 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Next
          </button>
        </div>
      </div>

      <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 shadow-sm">
        <p id="question-text" class="text-3xl text-midnight-violet font-bold leading-relaxed mb-8"></p>

        <div id="answer-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Answers rendered by JS -->
        </div>
      </div>
    </section>

    <!-- Question List Sidebar -->
    <aside id="question-sidebar" class="hidden bg-white border border-gray-200 rounded-2xl p-6 shadow-md">
      <div class="mb-4">
        <p class="text-sm uppercase tracking-widest text-berry-lipstick">All Questions</p>
        <h2 class="text-xl font-bold text-midnight-violet mt-1">Question List</h2>
      </div>

      <ul id="question-list" class="space-y-3">
        <!-- Questions rendered by JS -->
      </ul>
    </aside>

  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);

    const params  = new URLSearchParams(window.location.search);
    const quizId  = params.get('quizId');

    const loadingEl       = document.getElementById('loading-state');
    const errorEl         = document.getElementById('error-state');
    const questionPanel   = document.getElementById('question-panel');
    const questionSidebar = document.getElementById('question-sidebar');

    function showError(msg) {
      loadingEl.classList.add('hidden');
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    if (!quizId) {
      showError('No quiz selected. Please go back and choose a quiz.');
    } else {
      const [quizResult, questionsResult] = await Promise.all([
        supabase
          .from('quizzes')
          .select('id, title')
          .eq('id', quizId)
          .single(),
        supabase
          .from('quiz_questions')
          .select('order, question, answer1, answer2, answer3, answer4, isMultiple, correctAnswer')
          .eq('quiz', quizId)
          .order('order', { ascending: true }),
      ]);

      if (quizResult.error || !quizResult.data) {
        showError('Quiz not found.');
      } else {
        const quiz = quizResult.data;

        const questions = (questionsResult.data || []).map(q => ({
          text:          q.question,
          options:       q.isMultiple
            ? [q.answer1, q.answer2, q.answer3, q.answer4].filter(Boolean)
            : [q.answer1, q.answer2].filter(Boolean),
          correctAnswer: q.correctAnswer,
          isMultiple:    q.isMultiple,
        }));

        document.title = quiz.title;
        document.getElementById('quiz-title').textContent = quiz.title;

        loadingEl.classList.add('hidden');
        questionPanel.classList.remove('hidden');
        questionSidebar.classList.remove('hidden');

        document.getElementById('host-btn').addEventListener('click', () => {
          sessionStorage.setItem('selectedQuizId', quizId);
          window.location.href = '/game';
        });

        let currentIndex = 0;

        const colorClasses = [
          'bg-jungle-green text-white',
          'bg-blaze-orange text-white',
          'bg-berry-lipstick text-white',
          'bg-royal-plum text-white',
        ];

        function renderView() {
          const questionNumberEl = document.getElementById('question-number');
          const questionTextEl   = document.getElementById('question-text');
          const answerListEl     = document.getElementById('answer-list');
          const questionListEl   = document.getElementById('question-list');
          const prevBtn          = document.getElementById('prev-btn');
          const nextBtn          = document.getElementById('next-btn');

          if (!questions.length) {
            questionNumberEl.textContent = 'No questions yet';
            questionTextEl.textContent   = '';
            answerListEl.innerHTML       = '';
            questionListEl.innerHTML     = '<li class="text-gray-400 text-sm">No questions added yet.</li>';
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            return;
          }

          const current = questions[currentIndex];
          questionNumberEl.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
          questionTextEl.textContent   = current.text;

          answerListEl.innerHTML = '';
          current.options.forEach((answer, i) => {
            const isCorrect = (i + 1) === current.correctAnswer;
            const div = document.createElement('div');
            div.className = `rounded-xl px-4 py-3 shadow ring-1 ring-white/15 flex items-center gap-2 ${colorClasses[i % colorClasses.length]}`;
            div.innerHTML = `
              <span class="font-bold">${String.fromCharCode(65 + i)}.</span>
              <span class="flex-1">${escapeHtml(answer)}</span>
              ${isCorrect ? '<span class="text-xs font-bold bg-white/20 px-2 py-0.5 rounded-full">Correct</span>' : ''}
            `;
            answerListEl.appendChild(div);
          });

          questionListEl.innerHTML = '';
          questions.forEach((q, i) => {
            const li      = document.createElement('li');
            const isActive = i === currentIndex;
            li.className = [
              'border rounded-xl px-4 py-3 cursor-pointer transition shadow-sm',
              isActive
                ? 'bg-midnight-violet border-midnight-violet text-white'
                : 'bg-white border-gray-200 text-midnight-violet hover:border-blaze-orange hover:bg-orange-50',
            ].join(' ');
            li.innerHTML = `
              <div class="flex items-start gap-3">
                <div>
                  <p class="text-sm font-bold ${isActive ? 'text-blaze-orange' : 'text-berry-lipstick'}">Q${i + 1}</p>
                  <p class="text-sm leading-snug mt-1">${escapeHtml(q.text)}</p>
                </div>
              </div>
            `;
            li.addEventListener('click', () => { currentIndex = i; renderView(); });
            questionListEl.appendChild(li);
          });

          prevBtn.disabled = currentIndex === 0;
          nextBtn.disabled = currentIndex === questions.length - 1;
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
          if (currentIndex > 0) { currentIndex--; renderView(); }
        });
        document.getElementById('next-btn').addEventListener('click', () => {
          if (currentIndex < questions.length - 1) { currentIndex++; renderView(); }
        });

        renderView();
      }
    }
  </script>

</body>
</html>
