<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../public/output.css" rel="stylesheet">
</head>
<body>
    <Navbar-component></Navbar-component>
    <script src="./components/navbar.js"></script>

    <main class="min-h-screen bg-gray-100 flex items-center justify-center">

        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

            <!-- Title -->
            <div class="text-center mb-6">
                <h2 class="text-3xl font-extrabold text-gray-800">Create Account</h2>
                <p class="text-gray-500 mt-2">Join Let It Ride</p>
            </div>

            <!-- Error message -->
            <p id="register-error" class="hidden mb-4 text-sm text-berry-lipstick font-semibold text-center bg-berry-lipstick/10 rounded-xl px-4 py-2"></p>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-5">

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Email</label>
                    <input
                        id="reg-email"
                        type="email"
                        placeholder="Enter your email"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Username</label>
                    <input
                        id="reg-username"
                        type="text"
                        placeholder="Choose a username"
                        required
                        minlength="3"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Password</label>
                    <input
                        id="reg-password"
                        type="password"
                        placeholder="Create a password"
                        required
                        minlength="6"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Confirm Password</label>
                    <input
                        id="reg-confirm"
                        type="password"
                        placeholder="Confirm your password"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Submit -->
                <button
                    id="register-btn"
                    type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition">
                    Create Account
                </button>

            </form>

            <!-- Login Redirect -->
            <p class="text-center text-sm text-gray-600 mt-6">
                Already have an account?
                <a href="login.html" class="text-green-600 font-semibold hover:underline">Log in</a>
            </p>

        </div>

    </main>

    <script type="module">
        import { init } from '../js/views/registerView.js';
        init();
    </script>
</body>
</html>
