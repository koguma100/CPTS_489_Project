<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./../public/output.css" rel="stylesheet">
</head>
<body>
    
    <!-- This is a component for the navbar-->
    <Navbar-component></Navbar-component>
    <script src="./components/navbar.js"></script>


    <main class="min-h-screen bg-gray-100 flex items-center justify-center">

        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

            <!-- Title -->
            <div class="text-center mb-6">
                <h2 class="text-3xl font-extrabold text-gray-800">Create Account</h2>
                <p class="text-gray-500 mt-2">Join Let It Ride</p>
            </div>

            <!-- Register Form -->
            <form class="space-y-5">

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">
                        Email
                    </label>
                    <input 
                        type="email" 
                        placeholder="Enter your email"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">
                        Password
                    </label>
                    <input 
                        type="password" 
                        placeholder="Create a password"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">
                        Confirm Password
                    </label>
                    <input 
                        type="password" 
                        placeholder="Confirm your password"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                    />
                </div>

                <!-- Create Account Button -->
                <button 
                    type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition">
                    Create Account
                </button>

            </form>

            <!-- Login Redirect -->
            <p class="text-center text-sm text-gray-600 mt-6">
                Already have an account?
                <a href="login.html" class="text-green-600 font-semibold hover:underline">
                    Log in
                </a>
            </p>

        </div>

    </main>
</body>
</html>
