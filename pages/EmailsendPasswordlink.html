<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Let It Ride</title>
  <link href="../public/output.css" rel="stylesheet">
  <script src="/public/js/config.js"></script>
</head>
<body>
  <Navbar-component></Navbar-component>
  <script type="module" src="./components/navbar.js"></script>

  <main class="min-h-screen bg-gray-100 flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

      <!-- Title -->
      <div class="text-center mb-6" id="page-header">
        <h2 class="text-3xl font-extrabold text-gray-800">Forgot Password</h2>
        <p class="text-gray-500 mt-2">Enter your email and we'll send you a reset link</p>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="hidden mb-4 text-sm text-berry-lipstick bg-berry-lipstick/10 rounded-xl px-4 py-3"></div>

      <!-- Form -->
      <form id="forgotForm" class="space-y-5">

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-2">Email Address</label>
          <input id="forgot-email" type="email" placeholder="Enter your email"
            required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none transition" />
        </div>

        <button type="submit" id="submit-btn"
          class="w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition">
          Send Reset Link
        </button>

      </form>

      <!-- Success state (hidden until sent) -->
      <div id="success-state" class="hidden text-center space-y-4">
        <div class="text-5xl">📧</div>
        <h3 class="text-xl font-extrabold text-gray-800">Reset Link Sent</h3>
        <p class="text-gray-500 text-sm">Check your inbox and follow the link to reset your password.</p>
        <a href="/login" class="block w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 rounded-xl shadow-md transition text-center">
          Back to Login
        </a>
      </div>

      <div class="my-6 flex items-center">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="mx-4 text-gray-400 text-sm">OR</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <p class="text-center text-sm text-gray-600">
        Remember your password?
        <a href="/login" class="text-green-600 font-semibold hover:underline">Log in</a>
      </p>

    </div>
  </main>

  <script type="module">
    import { init } from '../js/views/auth/forgotPasswordView.js';
    init();
  </script>

</body>
</html>
