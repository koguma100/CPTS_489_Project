<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — Let It Ride Admin</title>
  <link rel="stylesheet" href="../../../public/output.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Mono', monospace; }
    .display { font-family: 'Bebas Neue', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <header class="bg-midnight-violet shadow-lg sticky top-0 z-50">
    <div class="px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="index.html" class="flex items-center gap-2">
          <span class="display text-white text-2xl tracking-widest">Let It Ride</span>
          <span class="text-xs font-bold uppercase tracking-widest bg-blaze-orange text-white px-2 py-0.5 rounded-md">Admin</span>
        </a>
      </div>
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-white/70 text-sm hover:text-white transition">← Back to Dashboard</a>
        <div class="flex items-center gap-2 bg-white/10 rounded-xl px-3 py-2">
          <span class="w-2 h-2 rounded-full bg-jungle-green animate-pulse"></span>
          <span class="text-white text-sm font-semibold">admin</span>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-6">

    <div>
      <h1 class="display text-5xl text-midnight-violet tracking-wide">My Account</h1>
      <p class="text-gray-700 text-sm mt-1">Manage your profile and messages.</p>
    </div>

    <!-- Account Info -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="display text-2xl text-midnight-violet tracking-wide mb-5">Account Info</h2>

      <div class="flex items-center gap-5 mb-6 pb-6 border-b border-gray-100">
        <div class="w-16 h-16 rounded-2xl bg-royal-plum flex items-center justify-center flex-shrink-0">
          <span class="display text-white text-3xl">A</span>
        </div>
        <div>
          <div class="font-bold text-midnight-violet text-lg">Admin User</div>
          <div class="text-gray-700 text-sm">admin@letitride.com</div>
          <span class="inline-block mt-1 text-xs font-bold uppercase tracking-widest bg-blaze-orange/10 text-blaze-orange px-2 py-0.5 rounded-md">Super Admin</span>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="text-xs uppercase tracking-widest text-gray-700 block mb-1">Username</label>
          <input type="text" value="admin"
            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-midnight-violet font-mono outline-none focus:border-royal-plum transition" />
        </div>
        <div>
          <label class="text-xs uppercase tracking-widest text-gray-700 block mb-1">Email</label>
          <input type="email" value="admin@letitride.com"
            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-midnight-violet font-mono outline-none focus:border-royal-plum transition" />
        </div>
        <div>
          <label class="text-xs uppercase tracking-widest text-gray-700 block mb-1">Member Since</label>
          <input type="text" value="October 1, 2024" readonly
            class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 font-mono outline-none cursor-default" />
        </div>
        <div>
          <label class="text-xs uppercase tracking-widest text-gray-700 block mb-1">Last Login</label>
          <input type="text" value="Today, 9:42 AM" readonly
            class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 font-mono outline-none cursor-default" />
        </div>
      </div>

      <div class="flex gap-3 mt-5">
        <button class="text-sm px-5 py-2.5 rounded-xl bg-midnight-violet text-white font-semibold hover:brightness-110 transition">
          Save Changes
        </button>
        <button class="text-sm px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition">
          Change Password
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="display text-2xl text-midnight-violet tracking-wide">Messages</h2>
        <span id="unread-count" class="text-xs font-bold bg-berry-lipstick text-white px-2.5 py-1 rounded-full">3 unread</span>
      </div>

      <!-- Filter tabs -->
      <div class="flex gap-2 mb-4">
        <button onclick="filterMessages('all')" id="msg-filter-all"
          class="text-xs px-3 py-1.5 rounded-lg bg-midnight-violet text-white font-semibold transition">All</button>
        <button onclick="filterMessages('unread')" id="msg-filter-unread"
          class="text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition">Unread</button>
        <button onclick="filterMessages('read')" id="msg-filter-read"
          class="text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition">Read</button>
      </div>

      <div id="message-list" class="space-y-2"></div>
      <div id="no-messages" class="hidden text-center py-8 text-gray-700 text-sm">No messages here.</div>
    </div>

  </main>

  <script>
    const messages = [
      { id: 1, from: "@mia_t",   subject: "Account appeal",        preview: "I'd like to appeal the flag on my account. I believe it was a mistake...", time: "10m ago",  read: false },
      { id: 2, from: "System",   subject: "Server update complete", preview: "The scheduled maintenance has completed successfully. All systems nominal.", time: "1h ago",   read: false },
      { id: 3, from: "@noah_x",  subject: "Question about my ban",  preview: "Hi, I was wondering why my account was flagged. Can you explain?",         time: "3h ago",   read: false },
      { id: 4, from: "@jake_r",  subject: "Feature request",        preview: "Would it be possible to add team mode to the game? Our class would love it.", time: "Yesterday", read: true  },
      { id: 5, from: "System",   subject: "Weekly report ready",    preview: "Your weekly analytics report for the period Mar 1–7 is now available.",    time: "2d ago",   read: true  },
    ];

    let activeFilter = 'all';

    function renderMessages(list) {
      const container = document.getElementById('message-list');
      const empty = document.getElementById('no-messages');
      if (!list.length) { container.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      container.innerHTML = list.map(m => `
        <div onclick="markRead(${m.id})" id="msg-${m.id}"
          class="flex items-start gap-4 p-4 rounded-xl border cursor-pointer transition
                 ${m.read ? 'border-gray-100 bg-white hover:bg-gray-50' : 'border-royal-plum/20 bg-royal-plum/5 hover:bg-royal-plum/10'}">
          <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center font-bold text-sm text-white
                      ${m.from === 'System' ? 'bg-blaze-orange' : 'bg-berry-lipstick'}">
            ${m.from === 'System' ? '⚙' : m.from[1].toUpperCase()}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between gap-2 mb-0.5">
              <span class="font-bold text-midnight-violet text-sm ${m.read ? '' : ''}">${m.from}</span>
              <span class="text-xs text-gray-700 flex-shrink-0">${m.time}</span>
            </div>
            <div class="text-sm font-semibold text-midnight-violet mb-0.5">${m.subject}</div>
            <div class="text-xs text-gray-700 truncate">${m.preview}</div>
          </div>
          ${!m.read ? '<span class="w-2 h-2 rounded-full bg-berry-lipstick flex-shrink-0 mt-1.5"></span>' : ''}
        </div>
      `).join('');
    }

    function markRead(id) {
      const msg = messages.find(m => m.id === id);
      if (!msg || msg.read) return;
      msg.read = true;
      updateUnreadCount();
      filterMessages(activeFilter);
    }

    function updateUnreadCount() {
      const count = messages.filter(m => !m.read).length;
      const badge = document.getElementById('unread-count');
      badge.textContent = count ? `${count} unread` : 'All read';
      badge.className = count
        ? 'text-xs font-bold bg-berry-lipstick text-white px-2.5 py-1 rounded-full'
        : 'text-xs font-bold bg-jungle-green text-white px-2.5 py-1 rounded-full';
    }

    function filterMessages(filter) {
      activeFilter = filter;
      ['all','unread','read'].forEach(f => {
        document.getElementById(`msg-filter-${f}`).className = f === filter
          ? 'text-xs px-3 py-1.5 rounded-lg bg-midnight-violet text-white font-semibold transition'
          : 'text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition';
      });
      const list = filter === 'all' ? messages
        : filter === 'unread' ? messages.filter(m => !m.read)
        : messages.filter(m => m.read);
      renderMessages(list);
    }

    filterMessages('all');
  </script>

</body>
</html>
