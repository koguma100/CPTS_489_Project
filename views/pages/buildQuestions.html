<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Questions</title>
    <link href="./../public/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <navbar-component></navbar-component>
    <script src="../js/components/navbar.js"></script>

    <main class="px-6 py-10">
        <section class="max-w-4xl mx-auto">
            <div class="bg-white rounded-3xl shadow-2xl p-8">
                <div class="mb-8 text-center">
                    <h1 class="text-3xl font-extrabold text-gray-800">Build Your Questions</h1>
                    <p class="text-gray-500 mt-2">Fill in the questions for your quiz</p>
                </div>

                <form id="questionsForm" class="space-y-8">
                    <div id="questionsContainer" class="space-y-8"></div>

                    <button
                        type="submit"
                        class="w-full bg-berry-lipstick hover:bg-berry-lipstick-dim text-white font-extrabold py-3 rounded-xl shadow-md transition"
                    >
                        Save Quiz
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const quizSetup = JSON.parse(sessionStorage.getItem("quizSetup"));
        const container = document.getElementById("questionsContainer");

        if (!quizSetup) {
            container.innerHTML = `
                <p class="text-red-500 font-semibold">No quiz setup found. Please go back and create a game first.</p>
            `;
        } else {
            // True / False questions
            for (let i = 1; i <= quizSetup.tfQuestions; i++) {
                const block = document.createElement("div");
                block.className = "border border-gray-200 rounded-2xl p-6 bg-gray-50";
                block.innerHTML = `
                    <h2 class="text-xl font-bold text-gray-800 mb-4">True / False Question ${i}</h2>

                    <label class="block text-sm font-bold text-gray-700 mb-2">Question</label>
                    <input
                        type="text"
                        name="tf_question_${i}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
                        placeholder="Enter true/false question"
                        required
                    />

                    <label class="block text-sm font-bold text-gray-700 mb-2">Correct Answer</label>
                    <select
                        name="tf_answer_${i}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300"
                        required
                    >
                        <option value="">Select answer</option>
                        <option value="true">True</option>
                        <option value="false">False</option>
                    </select>
                `;
                container.appendChild(block);
            }

            // Multiple choice questions
            for (let i = 1; i <= quizSetup.mcQuestions; i++) {
                const block = document.createElement("div");
                block.className = "border border-gray-200 rounded-2xl p-6 bg-gray-50";
                block.innerHTML = `
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Multiple Choice Question ${i}</h2>

                    <label class="block text-sm font-bold text-gray-700 mb-2">Question</label>
                    <input
                        type="text"
                        name="mc_question_${i}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
                        placeholder="Enter multiple choice question"
                        required
                    />

                    <label class="block text-sm font-bold text-gray-700 mb-2">Option A</label>
                    <input
                        type="text"
                        name="mc_${i}_a"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-3"
                        required
                    />

                    <label class="block text-sm font-bold text-gray-700 mb-2">Option B</label>
                    <input
                        type="text"
                        name="mc_${i}_b"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-3"
                        required
                    />

                    <label class="block text-sm font-bold text-gray-700 mb-2">Option C</label>
                    <input
                        type="text"
                        name="mc_${i}_c"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-3"
                        required
                    />

                    <label class="block text-sm font-bold text-gray-700 mb-2">Option D</label>
                    <input
                        type="text"
                        name="mc_${i}_d"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 mb-4"
                        required
                    />

                    <label class="block text-sm font-bold text-gray-700 mb-2">Correct Answer</label>
                    <select
                        name="mc_answer_${i}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300"
                        required
                    >
                        <option value="">Select correct answer</option>
                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                        <option value="C">Option C</option>
                        <option value="D">Option D</option>
                    </select>
                `;
                container.appendChild(block);
            }
        }

        document.getElementById("questionsForm").addEventListener("submit", function(e) {
            e.preventDefault();

            sessionStorage.setItem("quizSetup", null);
            if (!quizSetup){
                alert("No Questions to save!");
            }
            else
                alert("Questions saved successfully!");

            window.location.href = "index.html";
        });
    </script>
</body>
</html>
